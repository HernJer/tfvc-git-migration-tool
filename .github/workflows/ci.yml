name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate module
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Validate manifest and lint
        shell: pwsh
        run: ./build/Build.ps1 -Test

      - name: Run Pester tests
        shell: pwsh
        run: |
          if (Test-Path ./tests) {
            Install-Module Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser
            Import-Module Pester -MinimumVersion 5.0.0
            $result = Invoke-Pester -Path ./tests -Output Detailed -PassThru
            if ($result.FailedCount -gt 0) { throw "$($result.FailedCount) test(s) failed." }
          }
          else {
            Write-Host 'No tests/ directory - skipping.'
          }
