name: Publish

# Fires when a version tag is pushed, e.g. v1.0.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  publish:
    name: Build and publish package
    runs-on: windows-latest
    env:
      PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
      CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $tag   = "${{ github.ref_name }}"
          $ver   = $tag.TrimStart('v')
          $parts = $ver -split '-', 2
          $core  = $parts[0]
          $label = if ($parts.Count -gt 1) { $parts[1] } else { '' }
          if ($core -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "Tag '$tag' must be vN.N.N or vN.N.N-LABEL (got core '$core')."
          }
          if ($label -and $label -notmatch '^[a-zA-Z0-9]+$') {
            throw "Prerelease label must be alphanumeric, e.g. v1.0.0-beta1 (got '$label')."
          }
          $full = if ($label) { "$core-$label" } else { $core }
          $pre  = if ($label) { 'true' } else { 'false' }
          "core=$core"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "label=$label"      | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "full=$full"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "isPrerelease=$pre" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Publishing $full (prerelease=$pre)"

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Build (stamp, test, package, choco-stage)
        shell: pwsh
        run: ./build/Build.ps1 -Version ${{ steps.version.outputs.core }} -Prerelease '${{ steps.version.outputs.label }}' -Stamp -Test -Package -Choco

      # --- PowerShell Gallery ---
      - name: Publish to PowerShell Gallery
        if: ${{ env.PSGALLERY_API_KEY != '' }}
        shell: pwsh
        run: Publish-Module -Path ./dist/Tfvc2Git -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose

      - name: Skip PSGallery (no key configured)
        if: ${{ env.PSGALLERY_API_KEY == '' }}
        shell: pwsh
        run: Write-Host '::warning::PSGALLERY_API_KEY secret not set - skipping PowerShell Gallery publish.'

      # --- Chocolatey ---
      - name: Pack and push Chocolatey package
        shell: pwsh
        run: |
          choco pack build/choco/tfvc2git.nuspec --version ${{ steps.version.outputs.full }} --outputdirectory dist
          if ($env:CHOCO_API_KEY) {
            choco push (Get-ChildItem dist/*.nupkg | Select-Object -First 1).FullName --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY
          }
          else {
            Write-Host '::warning::CHOCO_API_KEY secret not set - packed .nupkg but skipped push.'
          }

      # --- GitHub Release ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.isPrerelease }}
          files: |
            dist/*.zip
            dist/*.nupkg
